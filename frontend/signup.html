<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sign up — AskTheCompany</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <h1>Create your workspace</h1>
    <p class="sub">Bring your own documents. Every workspace is fully isolated.</p>
    <form id="signupForm">
      <div class="field">
        <label>Workspace / company name</label>
        <input type="text" id="workspace_name" required placeholder="Acme Technologies" />
      </div>
      <div class="field">
        <label>Your name</label>
        <input type="text" id="full_name" required placeholder="Aisha Khan" />
      </div>
      <div class="field">
        <label>Work email</label>
        <input type="email" id="email" required placeholder="you@company.com" autocomplete="username" />
      </div>
      <div class="field">
        <label>Password (min 8 characters)</label>
        <input type="password" id="password" required minlength="8" placeholder="••••••••" autocomplete="new-password" />
      </div>
      <button type="submit" class="primary" style="width:100%">Create workspace</button>
      <div class="auth-error" id="error"></div>
    </form>
    <div class="auth-switch">Already have an account? <a href="/login.html">Log in</a></div>
  </div>
</div>
<script src="/auth.js?v=demo-seed-1"></script>
<script>
redirectIfAuthed();
document.getElementById("signupForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const errorEl = document.getElementById("error");
  errorEl.textContent = "";
  try {
    const data = await api("/api/auth/signup", {
      method: "POST",
      body: JSON.stringify({
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
        full_name: document.getElementById("full_name").value.trim(),
        workspace_name: document.getElementById("workspace_name").value.trim(),
      }),
    });
    setSession(data.access_token, data.user_email, data.workspace_name);
    window.location.href = "/index.html";
  } catch (err) {
    errorEl.textContent = err.message;
  }
});
</script>
</body>
</html>
